apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: app
data:
  nginx.conf: |
    events {}
    http {
      upstream frontend {
        server frontend:80;
      }
      upstream backend {
        server backend:8080;
      }
      server {
        listen 80;
        location /api/ {
          proxy_pass http://backend;
          proxy_set_header Host $host;
        }
        location / {
          proxy_pass http://frontend;
          proxy_set_header Host $host;
        }
      }
    }