apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: shreepalsingh/crud-dd-task-mean-app-frontend:1.0.3
          imagePullPolicy: Always
          ports:
            - containerPort: 80

